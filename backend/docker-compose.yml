version: '3.8'

services:
  # Redis service for job queue
  redis:
    image: redis:7-alpine
    container_name: snowbooks-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # SnowBooks backend service
  backend:
    build: .
    container_name: snowbooks-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
      - ./temp:/app/temp
    depends_on:
      - redis
    command: npm run start:dev

volumes:
  redis_data:
