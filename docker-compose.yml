version: '3.8'

services:
  # Redis for job queue
  redis:
    image: redis:7-alpine
    container_name: snowbooks-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snowbooks-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - UPLOAD_DIR=/app/uploads
      - TEMP_DIR=/app/temp
      - MAX_FILE_SIZE=1073741824
      - FILE_CLEANUP_INTERVAL=3600000
      - FFMPEG_PATH=ffmpeg
      - MAX_CONCURRENT_JOBS=3
      - JOB_TIMEOUT=1800000
      - CORS_ORIGIN=http://localhost:5173
      - CORS_CREDENTIALS=true
      - WS_CORS_ORIGIN=http://localhost:5173
      - LOG_LEVEL=debug
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
      - backend_temp:/app/temp
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: npm run start:dev

  # React Frontend
  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: snowbooks-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001/api
      - VITE_WS_URL=http://localhost:3001
      - VITE_NODE_ENV=development
    volumes:
      - ./app:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  backend_temp:
    driver: local

networks:
  default:
    name: snowbooks-network
