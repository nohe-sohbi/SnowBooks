# Development overrides for Docker Compose
services:
  backend:
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    ports:
      - "9229:9229"  # Node.js debugging port
    command: npm run start:debug

  frontend:
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_NODE_ENV=development
    stdin_open: true
    tty: true
