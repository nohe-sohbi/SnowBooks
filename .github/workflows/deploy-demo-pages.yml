name: Deploy demo to GitHub Pages

# Builds the frontend in 100% client-side demo mode and publishes it to Pages.
# Runs only from the `demo` branch — `main` (the full-stack app) is never touched.
on:
  push:
    branches: [demo]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs of the same group.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # vite build (not `npm run build`) skips the project's tsc gate on purpose:
      # the demo only needs to bundle, and esbuild strips types.
      - run: npx vite build --mode demo
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
